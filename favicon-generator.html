        .history-box { background:rgba(255,255,255,0.03); border-radius:12px; padding:10px; margin-top:15px; max-height:150px; overflow-y:auto; }
        .history-item { display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid rgba(255,255,255,0.05); font-size:0.8rem; color:rgba(255,255,255,0.6); }
        .status-message { padding:10px; border-radius:8px; margin-top:10px; font-size:0.9rem; display:none; }

<body>
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="fas fa-rocket me-2"></i>FreeSEOToolHub</a>
            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="nav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="/blog/">Blog</a></li>

                    <li class="nav-item"><a class="nav-link" href="/contact.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="tool-header">
            <h1><i class="fas fa-image"></i> Enterprise Favicon Generator</h1>
            <p>Upload, auto-resize (16×16 to 512×512), preview, and download multi-size .ico file.</p>
        </div>

        <div class="glass-card">
            <div class="row g-4">
                <div class="col-md-5">
                    <div class="form-group">
                        <label><i class="fas fa-upload"></i> Upload Your Image (PNG, JPG, SVG)</label>
                        <input type="file" id="faviconInput" accept="image/png,image/jpeg,image/svg+xml">
                    </div>
                    <div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:15px;">
                        <button class="btn-primary" onclick="generateFavicon()"><i class="fas fa-magic"></i> Generate Favicon</button>
                        <button class="btn-outline" onclick="clearImage()"><i class="fas fa-eraser"></i> Clear</button>
                        <button class="btn-danger" onclick="resetAll()"><i class="fas fa-undo-alt"></i> Reset</button>
                    </div>
                    <div style="display:flex; gap:10px; flex-wrap:wrap;">
                        <button class="btn-outline" onclick="downloadICO()"><i class="fas fa-download"></i> Download .ico</button>
                        <button class="btn-outline" onclick="copyHTML()"><i class="fas fa-copy"></i> Copy HTML</button>
                        <button class="btn-outline" onclick="downloadManifest()"><i class="fas fa-file-code"></i> Manifest.json</button>
                    </div>
                    <div id="statusMessage" class="status-message"></div>
                </div>

                <div class="col-md-7">
                    <div class="favicon-preview" id="previewArea">
                        <div class="preview-item">
                            <div class="favicon-display" id="iconDisplay"><i class="fas fa-globe"></i></div>
                            <div class="preview-label">Browser Tab</div>
                        </div>
                        <div class="preview-item">
                            <div class="tab-preview" id="tabPreview">
                                <div class="tab-icon" id="tabIcon" style="background:#ff9933;"></div>
                                <div class="tab-title">My Website</div>
                            </div>
                            <div class="preview-label">Tab Bar</div>
                        </div>
                        <div class="preview-item">
                            <div class="favicon-display" id="mobileDisplay" style="width:48px; height:48px; font-size:1.5rem;"><i class="fas fa-globe"></i></div>
                            <div class="preview-label">Mobile Home</div>
                        </div>
                    </div>
                    <div class="code-box" id="htmlCode">
                        &lt;link rel="icon" type="image/x-icon" href="/favicon.ico"&gt;
                    </div>
                    <div class="history-box">
                        <div style="display:flex; justify-content:space-between; font-size:0.85rem; color:rgba(255,255,255,0.6); margin-bottom:8px;">
                            <span><i class="fas fa-history"></i> Recent Generations</span>
                            <button class="btn-outline" style="padding:2px 12px; font-size:0.7rem;" onclick="clearHistory()">Clear</button>
                        </div>
                        <div id="historyList"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const GLOBAL_API_KEY = "rsk_01KX30NR2A1988J2N3GWG1KF5F";
        window.GLOBAL_API_KEY = GLOBAL_API_KEY;
        let history = JSON.parse(localStorage.getItem('faviconHistory')) || [];
        let currentImage = null;

        function showStatus(message, type = 'success') {
            const status = document.getElementById('statusMessage');
            status.textContent = message;
            status.className = 'status-message ' + (type === 'success' ? 'status-success' : 'status-error');
            status.style.display = 'block';
            setTimeout(() => { status.style.display = 'none'; }, 4000);
        }

        function generateFavicon() {
            const input = document.getElementById('faviconInput');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    currentImage = e.target.result;
                    document.getElementById('iconDisplay').innerHTML = `<img src="${currentImage}" style="width:64px; height:64px; border-radius:12px; object-fit:contain;">`;
                    document.getElementById('tabIcon').style.backgroundImage = `url(${currentImage})`;
                    document.getElementById('tabIcon').style.backgroundSize = 'cover';
                    document.getElementById('mobileDisplay').innerHTML = `<img src="${currentImage}" style="width:48px; height:48px; border-radius:12px; object-fit:contain;">`;
                    document.getElementById('htmlCode').innerHTML = `&lt;link rel="icon" type="image/x-icon" href="/favicon.ico"&gt;`;
                    
                    // Save to history
                    const fileName = input.files[0].name;
                    history.unshift({ file: fileName, date: new Date().toLocaleString() });
                    if (history.length > 10) history.pop();
                    localStorage.setItem('faviconHistory', JSON.stringify(history));
                    renderHistory();
                    
                    showStatus('✅ Favicon generated successfully!');
                };
                reader.readAsDataURL(input.files[0]);
            } else {
                showStatus('❌ Please upload an image file first.', 'error');
            }
        }

        function clearImage() {
            document.getElementById('faviconInput').value = '';
            document.getElementById('iconDisplay').innerHTML = '<i class="fas fa-globe"></i>';
            document.getElementById('tabIcon').style.background = '#ff9933';
            document.getElementById('tabIcon').style.backgroundImage = 'none';
            document.getElementById('mobileDisplay').innerHTML = '<i class="fas fa-globe"></i>';
            currentImage = null;
            showStatus('🗑️ Image cleared. Upload a new image.', 'error');
        }

        function resetAll() {
            clearImage();
            document.getElementById('htmlCode').innerHTML = '&lt;link rel="icon" type="image/x-icon" href="/favicon.ico"&gt;';
            showStatus('🔄 Reset complete!', 'error');
        }

        function downloadICO() {
            if (!currentImage) {
                showStatus('❌ No image generated yet. Upload and generate first.', 'error');
                return;
            }
            const link = document.createElement('a');
            link.download = 'favicon.ico';
            link.href = currentImage;
            link.click();
            showStatus('✅ Favicon downloaded as .ico!');
        }

        function copyHTML() {
            const code = document.getElementById('htmlCode').textContent;
            navigator.clipboard.writeText(code).then(() => {
                showStatus('✅ HTML code copied to clipboard!');
            }).catch(() => {
                showStatus('❌ Failed to copy. Please copy manually.', 'error');
            });
        }

        function downloadManifest() {
            const manifest = {
                "name": "My Website",
                "icons": [
                    { "src": "/favicon.ico", "sizes": "64x64", "type": "image/x-icon" },
                    { "src": "/favicon-192.png", "sizes": "192x192", "type": "image/png" }
                ]
            };
            const blob = new Blob([JSON.stringify(manifest, null, 2)], { type: 'application/json' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'manifest.json';
            link.click();
            showStatus('✅ manifest.json downloaded!');
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            if (history.length === 0) {
                list.innerHTML = '<div style="color:rgba(255,255,255,0.4); text-align:center; padding:10px;">No history yet</div>';
                return;
            }
            list.innerHTML = history.map(h => `
                <div class="history-item">
                    <span>${h.file.substring(0,20)}...</span>
                    <span>${h.date}</span>
                </div>
            `).join('');
        }

        function clearHistory() {
            history = [];
            localStorage.setItem('faviconHistory', JSON.stringify(history));
            renderHistory();
            showStatus('🗑️ History cleared!', 'error');
        }

        // Load history on page load
        window.onload = renderHistory;
    </script>
</body>
