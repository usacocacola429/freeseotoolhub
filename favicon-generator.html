    <div class="container">
        <div class="tool-header">
            <h1><i class="fas fa-image"></i> Favicon Generator 2026</h1>
            <p>Upload an image and preview how your favicon looks on browser tabs, bookmarks & mobile devices.</p>
        </div>

        <div class="glass-card">
            <div class="row g-4">
                <div class="col-md-5">
                    <div class="form-group">
                        <label><i class="fas fa-upload"></i> Upload Your Image (PNG, JPG, SVG)</label>
                        <input type="file" id="faviconInput" accept="image/png,image/jpeg,image/svg+xml">
                    </div>
                    <button class="btn-primary" onclick="generateFavicon()"><i class="fas fa-magic"></i> Generate Favicon</button>
                    <div style="margin-top:15px; text-align:center; color:rgba(255,255,255,0.5); font-size:0.8rem;">
                        <i class="fas fa-info-circle"></i> Recommended: 512×512 px PNG
                    </div>
                </div>

                <div class="col-md-7">
                    <div class="favicon-preview" id="previewArea">
                        <div class="preview-item">
                            <div class="favicon-display" id="iconDisplay">
                                <i class="fas fa-globe"></i>
                            </div>
                            <div class="preview-label">Browser Tab</div>
                        </div>
                        <div class="preview-item">
                            <div class="tab-preview" id="tabPreview">

                            </div>
                            <div class="preview-label">Tab Bar</div>
                        </div>
                        <div class="preview-item">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const GLOBAL_API_KEY = "rsk_01KX30NR2A1988J2N3GWG1KF5F";
        window.GLOBAL_API_KEY = GLOBAL_API_KEY;
        console.log("🔑 API Key loaded:", GLOBAL_API_KEY);

        function generateFavicon() {
            const input = document.getElementById('faviconInput');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = e.target.result;
                    document.getElementById('iconDisplay').innerHTML = `<img src="${img}" style="width:64px; height:64px; border-radius:12px; object-fit:contain;">`;
                    document.getElementById('tabIcon').style.backgroundImage = `url(${img})`;
                    document.getElementById('tabIcon').style.backgroundSize = 'cover';
                    document.getElementById('tabIcon').style.background = `url(${img}) center/cover`;
                    document.getElementById('mobileDisplay').innerHTML = `<img src="${img}" style="width:48px; height:48px; border-radius:12px; object-fit:contain;">`;
                    showToast('Favicon generated! ✅');
                };
                reader.readAsDataURL(input.files[0]);
            } else {
                showToast('Please upload an image file first.', 'error');
            }
        }

        function showToast(msg, type = 'success') {
            const container = document.getElementById('toastContainer') || document.body;
            const toast = document.createElement('div');
            toast.style.cssText = `
                position:fixed; bottom:24px; right:24px; background:rgba(30,41,59,0.95);
                backdrop-filter:blur(10px); color:#fff; padding:14px 22px; border-radius:12px;
                border:1px solid rgba(255,255,255,0.1); z-index:9999; animation:slideIn 0.3s ease;
            `;
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
    </script>
