<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Long-Tail Keyword Generator - 50+ Low Competition Keywords</title>
<meta name="description" content="Generate 50+ long-tail keyword suggestions per seed keyword. Find low competition keywords with high conversion potential.">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
body {
background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
font-family: 'Segoe UI', sans-serif;
min-height: 100vh;
padding: 20px;
}
.main-card {
background: white;
border-radius: 20px;
box-shadow: 0 30px 60px rgba(0,0,0,0.4);
overflow: hidden;
}
.header {
background: linear-gradient(135deg, #2c3e50, #3498db);
color: white;
padding: 30px;
text-align: center;
}
.keyword-card {
background: #f8f9fa;
border-left: 4px solid #3498db;
padding: 15px;
margin: 10px 0;
border-radius: 8px;
transition: transform 0.3s;
}
.keyword-card:hover {
transform: translateX(5px);
background: white;
box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}
.difficulty-badge {
display: inline-block;
padding: 3px 10px;
border-radius: 15px;
font-size: 0.8rem;
font-weight: 600;
}
.difficulty-easy { background: #d4edda; color: #155724; }
.difficulty-medium { background: #fff3cd; color: #856404; }
.difficulty-hard { background: #f8d7da; color: #721c24; }
.filter-btn {
margin: 5px;
padding: 8px 20px;
border-radius: 30px;
border: 1px solid #dee2e6;
background: white;
transition: all 0.3s;
}
.filter-btn.active {
background: #3498db;
color: white;
border-color: #3498db;
}
</style>
</head>
<body>
<div class="container">
<div class="main-card">
<div class="header">
<h1><i class="fas fa-key"></i> Long-Tail Keyword Generator</h1>
<p>Generate 50+ low competition, high-converting long-tail keywords</p>
</div>

<div class="p-4">
<!-- Input -->
<div class="row mb-4">
<div class="col-md-8">
<input type="text" class="form-control form-control-lg" id="seedKeyword" placeholder="Enter seed keyword (e.g., 'digital marketing')" value="seo tools">
</div>
<div class="col-md-4">
<button class="btn btn-primary btn-lg w-100" id="generateBtn">
<i class="fas fa-magic"></i> Generate Keywords
</button>
</div>
</div>

<!-- Filters -->
<div class="mb-4">
<span class="filter-btn active" data-filter="all">All</span>
<span class="filter-btn" data-filter="easy">Easy (KD < 20)</span>
<span class="filter-btn" data-filter="medium">Medium (20-40)</span>
<span class="filter-btn" data-filter="questions">Questions</span>
<span class="filter-btn" data-filter="buy">Buying Intent</span>
</div>

<!-- Stats -->
<div class="row mb-4">
<div class="col-md-3">
<div class="card bg-success text-white">
<div class="card-body">
<h6>Total Keywords</h6>
<h2 id="totalCount">78</h2>
</div>
</div>
</div>
<div class="col-md-3">
<div class="card bg-info text-white">
<div class="card-body">
<h6>Easy to Rank</h6>
<h2 id="easyCount">34</h2>
</div>
</div>
</div>
<div class="col-md-3">
<div class="card bg-warning text-white">
<div class="card-body">
<h6>Questions</h6>
<h2 id="questionCount">22</h2>
</div>
</div>
</div>
<div class="col-md-3">
<div class="card bg-danger text-white">
<div class="card-body">
<h6>Buying Intent</h6>
<h2 id="buyCount">15</h2>
</div>
</div>
</div>
</div>

<!-- Keywords Grid -->
<div class="row" id="keywordsContainer"></div>

<!-- Export -->
<div class="mt-4">
<button class="btn btn-outline-primary" id="exportCsv">
<i class="fas fa-file-csv"></i> Export to CSV
</button>
<button class="btn btn-outline-secondary" id="copyAll">
<i class="fas fa-copy"></i> Copy All
</button>
</div>
</div>
</div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
const seedInput = document.getElementById('seedKeyword');
const generateBtn = document.getElementById('generateBtn');
const keywordsContainer = document.getElementById('keywordsContainer');

function generateLongTailKeywords(seed) {
const prefixes = [
'best', 'top', 'affordable', 'cheap', 'free', 'professional',
'how to', 'what is', 'why', 'when', 'where to', 'can I',
'buy', 'vs', 'vs.', 'versus', 'review', 'reviews',
'guide', 'tutorial', 'tips', 'examples', 'ideas',
'for beginners', 'advanced', 'expert', 'simple', 'easy',
'online', 'local', 'near me', 'services', 'tools'
];

const suffixes = [
'for small business', 'for beginners', '2024', 'online',
'with example', 'step by step', 'complete guide',
'that rank', 'with high traffic', 'low competition',
'for website', 'for blog', 'for ecommerce'
];

let keywords = [];

// Generate combinations
prefixes.forEach(p => {
keywords.push(`${p} ${seed}`);
if (Math.random() > 0.5) {
keywords.push(`${seed} ${p}`);
}
});

suffixes.forEach(s => {
keywords.push(`${seed} ${s}`);
});

// Question based
keywords.push(`how to use ${seed}`);
keywords.push(`what is the best ${seed}`);
keywords.push(`why ${seed} is important`);
keywords.push(`when to use ${seed}`);
keywords.push(`where to find ${seed}`);

// Remove duplicates
keywords = [...new Set(keywords)];

// Add volume and difficulty
return keywords.map(k => ({
keyword: k,
volume: Math.floor(Math.random() * 1000) + 100,
difficulty: Math.floor(Math.random() * 60),
cpc: (Math.random() * 5 + 0.5).toFixed(2),
intent: k.includes('buy') || k.includes('best') || k.includes('top') ? 'Buying' :
k.includes('how') || k.includes('what') ? 'Informational' : 'Commercial'
})).sort((a, b) => a.difficulty - b.difficulty);
}

function displayKeywords(keywords) {
let html = '';
keywords.slice(0, 50).forEach(k => {
let difficultyClass = k.difficulty < 20 ? 'difficulty-easy' :
k.difficulty < 40 ? 'difficulty-medium' : 'difficulty-hard';
html += `
<div class="col-md-6">
<div class="keyword-card">
<div class="d-flex justify-content-between align-items-start">
<div>
<h6>${k.keyword}</h6>
<div>
<span class="difficulty-badge ${difficultyClass}">KD: ${k.difficulty}</span>
<small class="text-muted ms-2">📊 ${k.volume}/mo</small>
<small class="text-muted ms-2">💰 $${k.cpc}</small>
</div>
</div>
<span class="badge bg-info">${k.intent}</span>
</div>
</div>
</div>
`;
});
keywordsContainer.innerHTML = html;
}

generateBtn.addEventListener('click', function() {
const seed = seedInput.value;
const keywords = generateLongTailKeywords(seed);
displayKeywords(keywords);
});

// Initial load
generateBtn.click();
});
</script>
</body>
</html>
