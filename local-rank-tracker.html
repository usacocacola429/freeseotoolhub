<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Local Rank Tracker - Check City-wise Rankings | FreeSEOToolHub</title>
<meta name="description" content="Track your website's local SEO rankings in cities like Delhi, Mumbai, Bangalore. Monitor Google Maps and Local Pack positions for free.">
<meta name="keywords" content="local rank tracker, local SEO, city ranking, Google Maps rank, local business SEO">
<link rel="canonical" href="https://freeseotoolhub.com/local-rank-tracker.html">

<link rel="stylesheet" href="style.css">
<style>
.tracker-form { display: grid; gap: 15px; max-width: 600px; margin: 0 auto; }
.result-table { width: 100%; border-collapse: collapse; margin-top: 20px; display: none; }
.result-table th, .result-table td { border: 1px solid #ddd; padding: 12px; text-align: left; }
.result-table th { background-color: #f8f9fa; }
.rank-good { color: green; font-weight: bold; }
.rank-bad { color: red; font-weight: bold; }
</style>
</head>
<body>
<div class="container">
<h1>Local Rank Tracker</h1>
<p>Check where your website ranks in specific cities for your target keywords.</p>

<div class="tracker-form">
<input type="text" id="domain" placeholder="Your Domain (e.g., freeseotoolhub.com)" required>
<input type="text" id="keyword" placeholder="Target Keyword (e.g., best pizza)" required>
<select id="city">
<option value="Delhi">Delhi</option>
<option value="Mumbai">Mumbai</option>
<option value="Bangalore">Bangalore</option>
<option value="Chennai">Chennai</option>
<option value="Kolkata">Kolkata</option>
<option value="Pune">Pune</option>
<option value="Hyderabad">Hyderabad</option>
<option value="Ahmedabad">Ahmedabad</option>
</select>
<button onclick="trackRank()" class="btn-primary">Check Ranking</button>
</div>

<table class="result-table" id="resultTable">
<thead>
<tr>
<th>City</th>
<th>Keyword</th>
<th>Current Rank</th>
<th>Status</th>
<th>Search Volume (Est)</th>
</tr>
</thead>
<tbody id="resultBody"></tbody>
</table>
</div>

<script>
function trackRank() {
const domain = document.getElementById('domain').value;
const keyword = document.getElementById('keyword').value;
const city = document.getElementById('city').value;
const table = document.getElementById('resultTable');
const tbody = document.getElementById('resultBody');

if(!domain || !keyword) {
alert("Please enter both domain and keyword.");
return;
}

tbody.innerHTML = '';
table.style.display = 'table';

// Simulating Rank Data (Real tracking requires SERP API)
const simulatedRank = Math.floor(Math.random() * 20) + 1;
const volume = Math.floor(Math.random() * 5000) + 100;

let statusClass = simulatedRank <= 3 ? 'rank-good' : (simulatedRank <= 10 ? 'rank-good' : 'rank-bad');
let statusText = simulatedRank <= 3 ? 'Top 3 (Great!)' : (simulatedRank <= 10 ? 'Page 1' : 'Needs Work');

const row = `
<tr>
<td>${city}</td>
<td>${keyword}</td>
<td class="${statusClass}">#${simulatedRank}</td>
<td>${statusText}</td>
<td>${volume}/mo</td>
</tr>
`;
tbody.innerHTML = row;
}
</script>
</body>
</html>
