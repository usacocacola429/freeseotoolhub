<style>

* { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
body { background:linear-gradient(145deg,#4A1D6D,#2D0B4A); min-height:100vh; padding:1.5rem; }

/* Top Bar */
.top-bar { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; font-size:0.85rem; margin-bottom:15px; }
.top-bar a { color:var(--primary); text-decoration:none; }
.last-updated { background:var(--success); color:white; padding:5px 15px; border-radius:20px; }
.lang-selector { display:flex; gap:5px; }
.lang-btn { padding:4px 10px; border:1px solid var(--border); background:white; border-radius:15px; cursor:pointer; font-size:0.75rem; }
.lang-btn:hover, .lang-btn.active { background:var(--primary); color:white; border-color:var(--primary); }

/* Header */
h1 { font-size:2.8rem; font-weight:800; background:linear-gradient(135deg,var(--primary),#7B3FB0); -webkit-background-clip:text; -webkit-text-fill-color:transparent; display:flex; align-items:center; gap:15px; flex-wrap:wrap; }
.year-badge { background:var(--primary); color:white; padding:5px 15px; border-radius:20px; font-size:0.9rem; -webkit-text-fill-color:white; }
.subhead { font-size:1.2rem; color:var(--dark); margin:15px 0; border-left:4px solid var(--primary); padding-left:1rem; }

/* Search */
.search-section { background:linear-gradient(145deg,#F3E8FF,#E9D5FF); border-radius:1.5rem; padding:2rem; margin:1.5rem 0; border:2px solid var(--primary); }
.search-grid { display:grid; grid-template-columns:2fr 2fr 1fr; gap:1rem; align-items:center; }
@media (max-width:768px) { .search-grid { grid-template-columns:1fr; } }
.url-input { padding:1rem 1.2rem; border:2px solid #cbd5e0; border-radius:0.8rem; font-size:1rem; }
.url-input:focus { border-color:var(--primary); outline:none; }
.search-btn { background:var(--primary); color:white; border:none; padding:1rem 2rem; border-radius:0.8rem; font-weight:700; cursor:pointer; white-space:nowrap; }
.search-btn:hover { background:var(--primary-dark); transform:translateY(-2px); }

/* Stats */
.overview-cards { display:grid; grid-template-columns:repeat(4,1fr); gap:1rem; margin:1.5rem 0; }
@media (max-width:768px) { .overview-cards { grid-template-columns:repeat(2,1fr); } }
.stat-card { background:white; padding:1.2rem; border-radius:1rem; border:1px solid var(--border); text-align:center; }
.stat-number { font-size:2.2rem; font-weight:800; color:var(--primary); }
.stat-label { color:var(--gray); font-size:0.85rem; }

/* Chart */
.chart-container { background:white; border-radius:1rem; padding:1.5rem; margin:1.5rem 0; height:380px; border:1px solid var(--border); }

/* Topics */
.topics-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:1rem; margin:1.5rem 0; max-height:600px; overflow-y:auto; padding:0.5rem; }
.topic-card { background:white; border-radius:0.8rem; padding:1.2rem; border:1px solid var(--border); }
.topic-card.missed { border-left:4px solid var(--danger); background:#FEF2F2; }
.topic-card.partial { border-left:4px solid var(--warning); background:#FFFBEB; }
.topic-card.covered { border-left:4px solid var(--success); background:#F0FDF4; }
.topic-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:0.8rem; }
.topic-title { font-weight:700; font-size:1.05rem; }
.topic-score { padding:3px 12px; border-radius:20px; font-size:0.75rem; font-weight:600; }
.volume-bar { height:5px; background:var(--border); border-radius:3px; margin:0.5rem 0; overflow:hidden; }
.volume-fill { height:100%; background:var(--primary); border-radius:3px; }

/* Buttons */
.btn { padding:10px 20px; border:none; border-radius:10px; font-weight:600; cursor:pointer; display:inline-flex; align-items:center; gap:8px; font-size:0.9rem; }
.btn-primary { background:var(--primary); color:white; }

/* Tabs */
.tabs-container { display:flex; gap:8px; margin:1rem 0; flex-wrap:wrap; }

/* Toast */

@keyframes slideIn { from { transform:translateX(100%); opacity:0; } to { transform:translateX(0); opacity:1; } }

/* Footer */

      <span class="opportunity-badge" onclick="quickAnalyze('techblog.com','techcrunch.com,wired.com')">🔬 Tech</span>
      <span class="opportunity-badge" onclick="quickAnalyze('marketingblog.com','neilpatel.com,hubspot.com')">📊 Marketing</span>
      <span class="opportunity-badge" onclick="quickAnalyze('seosite.com','searchengineland.com,backlinko.com')">🔍 SEO</span>

    <button class="tab-btn" onclick="filterTopics('missed')">🚫 Missed</button>
    <button class="tab-btn" onclick="filterTopics('partial')">⚠️ Partial</button>
    <button class="tab-btn" onclick="filterTopics('covered')">✅ Covered</button>
  </div>

  <div class="topics-grid" id="topicsGrid"></div>

  <!-- Export -->
  <div style="display:flex; gap:10px; justify-content:flex-end; margin:1rem 0;">

<!-- Toast -->
<div class="toast-container" id="toastContainer"></div>

<script>
let currentTopics = [];
let gapChart;

function generateData() {
  return [
    { title:'AI in SEO', cluster:'ai', volume:4500, difficulty:35, competitors:['competitor1.com','competitor2.com'], status:'missed' },
    { title:'Machine Learning Marketing', cluster:'ai', volume:3800, difficulty:42, competitors:['competitor1.com','competitor3.com'], status:'missed' },
    { title:'Python Data Analysis', cluster:'tech', volume:6200, difficulty:28, competitors:['competitor2.com'], yourRank:45, status:'partial' },
    { title:'Content Marketing Strategy', cluster:'marketing', volume:8900, difficulty:65, competitors:['competitor1.com','competitor2.com'], yourRank:12, status:'covered' },
    { title:'SEO Best Practices 2026', cluster:'seo', volume:12400, difficulty:48, competitors:['competitor1.com','competitor3.com'], yourRank:8, status:'covered' },
    { title:'Link Building', cluster:'seo', volume:6700, difficulty:52, competitors:['competitor2.com'], yourRank:23, status:'partial' },
    { title:'Voice Search Optimization', cluster:'seo', volume:3200, difficulty:31, competitors:['competitor1.com'], status:'missed' },
    { title:'Blockchain Business', cluster:'business', volume:2800, difficulty:45, competitors:['competitor2.com'], status:'missed' },
    { title:'Remote Work Tools', cluster:'tech', volume:5400, difficulty:22, competitors:['competitor3.com'], yourRank:56, status:'partial' },
    { title:'Social Media Algorithms', cluster:'marketing', volume:7100, difficulty:58, competitors:['competitor1.com','competitor2.com'], yourRank:15, status:'covered' },
    { title:'ChatGPT Prompts', cluster:'ai', volume:15600, difficulty:18, competitors:['competitor1.com','competitor3.com'], status:'missed' },
    { title:'Mobile First Indexing', cluster:'seo', volume:3600, difficulty:41, competitors:['competitor1.com'], yourRank:27, status:'partial' }
  ];
}

function analyzeGaps() {
  currentTopics = generateData();
  updateAll();
  gtag('event', 'gap_analysis');
}

function updateAll(filter = 'all') {
  const missed = currentTopics.filter(t => t.status === 'missed').length;
  const partial = currentTopics.filter(t => t.status === 'partial').length;
  const covered = currentTopics.filter(t => t.status === 'covered').length;
  const gapScore = Math.round((missed + partial * 0.5) / currentTopics.length * 100);

  document.getElementById('overviewStats').innerHTML = `
    <div class="stat-card"><div class="stat-number">${currentTopics.length}</div><div class="stat-label">Total Topics</div></div>
    <div class="stat-card"><div class="stat-number">${missed}</div><div class="stat-label">Missed</div></div>
    <div class="stat-card"><div class="stat-number">${partial}</div><div class="stat-label">Partial</div></div>
    <div class="stat-card"><div class="stat-number">${gapScore}%</div><div class="stat-label">Gap Score</div></div>`;

  let topics = filter === 'all' ? currentTopics : currentTopics.filter(t => t.status === filter);
  
  document.getElementById('topicsGrid').innerHTML = topics.map(t => {
    const cls = t.status === 'missed' ? 'missed' : t.status === 'partial' ? 'partial' : 'covered';
    const label = t.status === 'missed' ? '🚫 Missing' : t.status === 'partial' ? '⚠️ Partial' : '✅ Covered';
    return `<div class="topic-card ${cls}">
      <div class="topic-header"><span class="topic-title">${t.title}</span><span class="topic-score" style="background:${t.status==='missed'?'#FEE2E2':t.status==='partial'?'#FEF3C7':'#D1FAE5'};">${label}</span></div>
      <div class="volume-bar"><div class="volume-fill" style="width:${(t.volume/16000)*100}%"></div></div>
      <div style="display:flex;justify-content:space-between;margin:8px 0;font-size:0.85rem;color:var(--gray);"><span>📊 ${t.volume.toLocaleString()}/mo</span><span>🎯 ${t.difficulty}% difficulty</span></div>
      <small style="color:var(--gray);">Competitors: ${t.competitors.join(', ')}</small>
      ${t.yourRank ? `<div style="margin-top:5px;color:var(--success);">Your rank: #${t.yourRank}</div>` : ''}
    </div>`;
  }).join('');

  // Update chart
  if (gapChart) gapChart.destroy();
  const clusters = ['SEO','Marketing','Tech','Business','AI'];
  gapChart = new Chart(document.getElementById('gapChart'), {
    type: 'radar',
    data: {
      labels: clusters,
      datasets: [
        { label:'Your Coverage', data:clusters.map(c=>currentTopics.filter(t=>t.cluster===c.toLowerCase()&&t.status==='covered').length), backgroundColor:'rgba(16,185,129,0.2)', borderColor:'#10B981', borderWidth:2 },
        { label:'Competitor Coverage', data:clusters.map(c=>currentTopics.filter(t=>t.cluster===c.toLowerCase()).length), backgroundColor:'rgba(239,68,68,0.2)', borderColor:'#EF4444', borderWidth:2 }
      ]
    },
    options: { responsive:true, maintainAspectRatio:false, scales:{ r:{ beginAtZero:true, max:6 } } }
  });
}

function filterTopics(filter) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  updateAll(filter);
}

function quickAnalyze(domain, competitors) {
  document.getElementById('yourDomain').value = domain;
  document.getElementById('competitors').value = competitors;
  analyzeGaps();
}

function exportCSV() {
  const csv = 'Topic,Status,Volume,Difficulty\n' + currentTopics.map(t => `${t.title},${t.status},${t.volume},${t.difficulty}`).join('\n');
  const blob = new Blob([csv], { type:'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'content-gap.csv';
  a.click();
  showToast('CSV exported!');
}

function shareResults() {
  if (navigator.share) { navigator.share({ title:'Content Gap Analyzer', url:window.location.href }).catch(() => {}); }
  else { navigator.clipboard.writeText(window.location.href).then(() => showToast('Link copied!')); }
}

function showToast(msg, type='success') {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = `<i class="fas fa-${type==='error'?'exclamation-circle':'check-circle'}"></i> ${msg}`;
  document.getElementById('toastContainer').appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// Init
window.onload = () => { currentTopics = generateData(); updateAll(); };
</script>
