<body>
<div class="container">
  <!-- Top Bar -->

    <div><a href="index.html"><i class="fas fa-home"></i> Home</a> › <a href="content-tools.html">Content Tools</a> › PAA Generator 2026</div>
    <div class="last-updated"><i class="far fa-calendar-alt"></i> Updated: April 2026</div>
  </div>

  <div class="main-card">
    <div class="header">
      <h1><i class="fas fa-question-circle"></i> People Also Ask Generator <span class="year-badge">2026</span></h1>
      <p>Generate 100+ questions for FAQ sections, content ideas & featured snippet optimization</p>
    </div>

    <div class="p-4">
      <!-- Input -->
      <div class="row mb-4">
        <div class="col-md-7 mb-3 mb-md-0">
          <input type="text" class="form-control form-control-lg" id="topicInput" placeholder="Enter topic (e.g., 'digital marketing')" value="seo">
        </div>
        <div class="col-md-3 mb-3 mb-md-0">
          <select class="form-control form-control-lg" id="languageSelect" style="border-radius:12px;">
            <option value="en">English</option>
            <option value="es">Español</option>
            <option value="hi">हिन्दी</option>
          </select>
        </div>
        <div class="col-md-2">
          <button class="btn btn-primary btn-lg w-100" id="generateBtn"><i class="fas fa-search"></i> Generate</button>
        </div>
      </div>

      <!-- Stats -->
      <div class="row mb-4">
        <div class="col-md-3 col-6 mb-2"><div class="stat-card bg-primary"><h6>Total</h6><h2 id="totalCount">0</h2></div></div>
        <div class="col-md-3 col-6 mb-2"><div class="stat-card bg-success"><h6>What/How</h6><h2 id="whatCount">0</h2></div></div>
        <div class="col-md-3 col-6 mb-2"><div class="stat-card bg-info"><h6>Why/When</h6><h2 id="whyCount">0</h2></div></div>
        <div class="col-md-3 col-6 mb-2"><div class="stat-card bg-warning"><h6>Which/Where</h6><h2 id="whereCount">0</h2></div></div>
      </div>

      <!-- Filters -->
      <div class="mb-4">
        <span class="category-tag active" data-cat="all">All</span>
        <span class="category-tag" data-cat="what">What</span>
        <span class="category-tag" data-cat="how">How</span>
        <span class="category-tag" data-cat="why">Why</span>
        <span class="category-tag" data-cat="when">When</span>
        <span class="category-tag" data-cat="which">Which</span>
        <span class="category-tag" data-cat="where">Where</span>
      </div>

      <!-- Questions -->
      <div id="questionsContainer"></div>

      <!-- Export -->
      <div class="mt-4 d-flex gap-3 flex-wrap">
        <button class="btn btn-outline-primary export-btn" id="exportFaq"><i class="fas fa-download"></i> Download FAQ</button>
        <button class="btn btn-outline-secondary export-btn" id="copyFaq"><i class="fas fa-copy"></i> Copy All</button>
        <button class="btn btn-outline-secondary export-btn" id="shareBtn"><i class="fas fa-share-alt"></i> Share</button>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast-container" id="toastContainer"></div>

<script>
let allQuestions = [], currentFilter = 'all', currentLang = 'en';

// Multi-language templates
const langTemplates = {
  en: {
    what: ['What is {topic}?','What are the best {topic} tools?','What does {topic} mean?','What is {topic} in simple terms?','What are the benefits of {topic}?','What is the future of {topic}?','What are {topic} examples?','What skills are needed for {topic}?','What makes {topic} effective?','What is the cost of {topic}?'],
    how: ['How to learn {topic}?','How to do {topic} for beginners?','How to improve {topic} skills?','How to start {topic} from scratch?','How to make money with {topic}?','How to become a {topic} expert?','How long does it take to learn {topic}?','How to use {topic} effectively?','How to measure {topic} success?','How to choose the best {topic}?'],
    why: ['Why is {topic} important?','Why choose {topic} as a career?','Why {topic} is growing?','Why {topic} matters for business?','Why learn {topic} in 2026?','Why does {topic} work?','Why invest in {topic}?'],
    when: ['When to use {topic}?','When is the best time to start {topic}?','When did {topic} become popular?','When to hire a {topic} professional?','When will {topic} change?'],
    which: ['Which {topic} course is best?','Which {topic} tool should I use?','Which {topic} strategy works?','Which {topic} certification is valuable?','Which {topic} platform is best?'],
    where: ['Where to learn {topic} online?','Where to find {topic} jobs?','Where to get {topic} help?','Where to start with {topic}?','Where is {topic} most used?']
  },
  es: {
    what: ['¿Qué es {topic}?','¿Cuáles son las mejores herramientas de {topic}?','¿Qué significa {topic}?','¿Qué beneficios tiene {topic}?','¿Cuál es el futuro de {topic}?'],
    how: ['¿Cómo aprender {topic}?','¿Cómo empezar con {topic}?','¿Cómo mejorar en {topic}?','¿Cómo ganar dinero con {topic}?'],
    why: ['¿Por qué es importante {topic}?','¿Por qué elegir {topic}?','¿Por qué crece {topic}?'],
    when: ['¿Cuándo usar {topic}?','¿Cuándo empezar con {topic}?'],
    which: ['¿Qué curso de {topic} es mejor?','¿Qué herramienta de {topic} usar?'],
    where: ['¿Dónde aprender {topic}?','¿Dónde encontrar trabajo de {topic}?']
  },
  hi: {
    what: ['{topic} क्या है?','{topic} के सबसे अच्छे टूल्स कौन से हैं?','{topic} का मतलब क्या है?','{topic} के क्या फायदे हैं?'],
    how: ['{topic} कैसे सीखें?','{topic} की शुरुआत कैसे करें?','{topic} से पैसे कैसे कमाएं?'],
    why: ['{topic} क्यों जरूरी है?','{topic} में करियर क्यों चुनें?'],
    when: ['{topic} कब शुरू करें?','{topic} का सबसे अच्छा समय क्या है?'],
    which: ['{topic} का सबसे अच्छा कोर्स कौन सा है?'],
    where: ['{topic} ऑनलाइन कहां सीखें?']
  }
};

const answers = {
  what: '{topic} refers to an important concept that helps businesses and individuals achieve their goals through effective strategies and tools.',
  how: 'To learn {topic}, start with online courses, practice regularly, join communities, follow experts, and work on real projects.',
  why: '{topic} is important because it drives growth, improves efficiency, and provides competitive advantages in today\'s fast-paced world.',
  when: 'The best time to start {topic} is now. With rapid changes in technology and business, staying ahead is crucial.',
  which: 'Choose {topic} tools/courses based on your needs, budget, and skill level. Read reviews and try free trials first.',
  where: 'You can find {topic} resources on online learning platforms, industry websites, and professional communities.'
};

function generateQuestions(topic, lang = 'en') {
  const templates = langTemplates[lang] || langTemplates.en;
  let questions = [];
  
  Object.entries(templates).forEach(([category, qs]) => {
    qs.forEach(q => {
      questions.push({
        question: q.replace('{topic}', topic),
        answer: (answers[category] || answers.what).replace('{topic}', topic),
        category
      });
    });
  });
  
  return questions;
}

function displayQuestions(questions) {
  const filtered = currentFilter === 'all' ? questions : questions.filter(q => q.category === currentFilter);
  
  document.getElementById('totalCount').textContent = questions.length;
  document.getElementById('whatCount').textContent = questions.filter(q => ['what','how'].includes(q.category)).length;
  document.getElementById('whyCount').textContent = questions.filter(q => ['why','when'].includes(q.category)).length;
  document.getElementById('whereCount').textContent = questions.filter(q => ['which','where'].includes(q.category)).length;

  document.getElementById('questionsContainer').innerHTML = filtered.map((q, i) => `
    <div class="question-card" onclick="this.classList.toggle('active')">
      <div class="d-flex justify-content-between align-items-start">
        <h6><i class="fas fa-question-circle text-primary"></i> ${q.question}</h6>
        <span class="badge bg-${q.category==='what'?'primary':q.category==='how'?'success':q.category==='why'?'info':q.category==='when'?'warning':'secondary'}">${q.category}</span>
      </div>
      <div class="answer">${q.answer}<div class="mt-2"><small class="text-muted">💡 Use in FAQ section</small></div></div>
    </div>
  `).join('');
}

// Generate
document.getElementById('generateBtn').addEventListener('click', () => {
  const topic = document.getElementById('topicInput').value.trim();
  currentLang = document.getElementById('languageSelect').value;
  if (!topic) { showToast('Enter a topic!'); return; }
  allQuestions = generateQuestions(topic, currentLang);
  currentFilter = 'all';
  document.querySelectorAll('.category-tag').forEach((t,i) => t.classList.toggle('active', i===0));
  displayQuestions(allQuestions);
  gtag('event', 'paa_generate', { topic, language: currentLang, count: allQuestions.length });
});

// Filters
document.querySelectorAll('.category-tag').forEach(tag => {
  tag.addEventListener('click', function() {
    document.querySelectorAll('.category-tag').forEach(t => t.classList.remove('active'));
    this.classList.add('active');
    currentFilter = this.dataset.cat;
    displayQuestions(allQuestions);
  });
});

// Export
document.getElementById('exportFaq').addEventListener('click', () => {
  const text = allQuestions.map(q => `Q: ${q.question}\nA: ${q.answer}\n`).join('\n');
  const blob = new Blob([text], { type:'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `faq-${document.getElementById('topicInput').value}.txt`;
  a.click();
  showToast('FAQ downloaded! 📥');
});

document.getElementById('copyFaq').addEventListener('click', () => {
  const text = allQuestions.map(q => q.question).join('\n');
  navigator.clipboard.writeText(text).then(() => showToast('All questions copied! 📋'));
});

document.getElementById('shareBtn').addEventListener('click', () => {
  if (navigator.share) { navigator.share({ title:'PAA Generator', url:window.location.href }).catch(()=>{}); }
  else { navigator.clipboard.writeText(window.location.href).then(() => showToast('Link copied!')); }
});

function showToast(msg) {
  const t = document.createElement('div'); t.className = 'toast';
  t.innerHTML = `<i class="fas fa-check-circle"></i> ${msg}`;
  document.getElementById('toastContainer').appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// Init
window.addEventListener('load', () => document.getElementById('generateBtn').click());
</script>
